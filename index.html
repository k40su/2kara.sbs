<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LYNX | Deployment not found</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<style>
body {
  margin:0;
  font-family:'Inter',sans-serif;
  background:#0a0a0a;
  color:#fff;
  overflow:hidden;
}

/* GRID BACKGROUND */
.grid {
  position:fixed;
  width:100%;
  height:100%;
  background-image: radial-gradient(rgba(255,0,0,0.15) 1px, transparent 1px);
  background-size: 30px 30px;
  animation: ripple 6s infinite linear;
}

@keyframes ripple {
  from {transform: scale(1);}
  to {transform: scale(1.2);}
}

/* CARD */
.card {
  position:absolute;
  top:50%; left:50%;
  transform:translate(-50%,-50%) scale(0.9);
  backdrop-filter: blur(20px);
  background: rgba(255,255,255,0.05);
  border:1px solid rgba(255,0,0,0.3);
  padding:40px;
  border-radius:20px;
  text-align:center;
  animation: fadeIn 1s ease forwards;
}

@keyframes fadeIn {
  to {opacity:1; transform:translate(-50%,-50%) scale(1);}
}

h1 {color:#ff3b3b;}
p {opacity:0.8;}

footer {
  position:fixed;
  bottom:10px;
  width:100%;
  text-align:center;
  font-size:12px;
  opacity:0.6;
}
</style>
</head>

<body>
<div class="grid"></div>

<div class="card">
	<h1>Deployment Not Found</h1>
	<p>The requested deployment could not be located.<br>It may have been removed.</p>
</div>

<footer>(c) 2026 LYNX Hosting GmbH</footer>
</body>
</html>
